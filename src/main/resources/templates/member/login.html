<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>로그인</title>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
<style>
body {
	font-family: Nanum Gothic Coding, sans-serif;
	display: flex;
	justify-content: center;
	align-items: center;
	height: 100vh;
}

.content {
	width: 100%;
	display: flex;
	justify-content: center;
	align-items: center;
	background-color: #f7f7f7;
}

.login-wrap {
	width: 500px;
	background-color: white;
	padding: 30px;
	text-align: center;
	border-radius: 10px;
	margin-top: 10%;
	margin-bottom: 150px;
}

.login-title {
	color: #854836;
	font-size: 25px;
	font-weight: bold;
	padding: 30px;
	padding-bottom: 40px;
}

.login-form {
	display: flex;
	flex-direction: column;
	gap: 5px;
}

.login-form>.login-input-wrap {
	display: flex;
	flex-direction: column;
	gap: 5px;
	margin: 30px;
	margin-bottom: 10px;
}

.login-form>.login-input-wrap>input {
	font-size: 16px;
	height: 40px;
	padding: 10px;
	border: 1px solid #854836;
	border-radius: 2px;
}

.login-form>.login-input-wrap>input:last-child {
	margin-top: 5px;
}

.login-option {
	display: flex;
	justify-content: left;
	align-items: center;
	margin-left: 30px;
	cursor: pointer;
}

.login-option>label {
	padding-left: 5px;
}

.alert {
	margin-left: 35px;
	text-align: left;
	font-size: small;
	font-weight: bold;
	color: red;
}

.login-button {
	height: 45px;
	border: 0;
	border-radius: 15px;
	color: white;
	background: #FFB22C;
	cursor: pointer;
	font-size: 18px;
	font-weight: 500;
	margin: 30px;
}

.login-footer {
	display: flex;
	justify-content: space-between;
	margin-top: 15px;
	font-size: 15px;
}

.login-footer a {
	text-decoration: none;
	color: #854836;
}

.login-footer button {
	text-decoration: none;
	color: #854836;
	border: none;
	background-color: transparent;
	font-size: 15px;
	cursor: pointer;
}

.login-footer a:hover,
.login-footer button:hover {
	font-weight: bold;
}

.material-icons-outlined {
	cursor: pointer;
	font-size: 20px;
	padding-top: 2px;
	color: #854836;
}

.dialog,
.dialogA {
	display: none;
	position: fixed;
	left: 0;
	top: 0;
	z-index: 10;
	width: 100%;
	height: 100%;
	background: rgba(0, 0, 0, 0.4);
}

.dialog>.tb,
.dialogA>.tb {
	display: flex;
	justify-content: center;
	align-items: center;
	width: 100%;
	height: 100%;
}

.dialog>.tb .inner,
.dialogA>.tb .inner {
	width: 80%;
	height: 560px;
	padding: 20px;
	background: #fff;
	border-radius: 12px;
	box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
	min-height: 300px;
}

.dialog .top,
.dialogA .top {
	display: flex;
	align-items: center;
	border-bottom: 1px solid #854836;
	justify-content: center;
	padding-bottom: 15px;
	margin-bottom: 15px;
}

.dialog .title,
.dialogA .title {
	font-weight: bold;
	font-size: 20px;
	color: #854836;
}

.dialog .ct,
.dialogA .ct {
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	gap: 12px;
	margin-top: 50px;
}

.dialog .ct .searchName-div,
.dialog .ct .searchPhone-div,
.dialogA .ct .searchId-div,
.dialogA .ct .searchPhone-div,
.dialogA .ct .searchPw-div,
.dialogA .ct .searchPwRe-div,
.dialogA .ct .searchEmail-div {
	width: 350px;
	display: flex;
	align-items: center;
	flex-direction: row;
	border-radius: 6px;
	background-color: #fff;
	border: 1px solid #854836;
	overflow: hidden;
}

.dialog .ct input,
.dialogA .ct input {
	flex: 1;
	border: none;
	padding: 10px;
	font-size: 14px;
	outline: none;
}

.dialogA .emailCertify-div {
	width: 350px;
	display: flex;
	align-items: center;
	gap: 8px;
}

.dialogA .emailCertify-div button {
	border: none;
	background: #FFB22C;
	color: #fff;
	padding: 9px 12px;
	border-radius: 6px;
	cursor: pointer;
	font-size: 12px;
}

.dialog .result-div,
.dialogA .result-div {
	font-size: 14px;
	color: #333;
	padding-top: 10px;
	min-height: 20px;
}

.dialog .sub-btn,
.dialogA .sub-btn {
	display: flex;
	justify-content: center;
	margin-top: 35px;
}

.dialog .sub-btn .search-btn,
.dialogA .sub-btn .insert-btn,
.dialogA .sub-btn .rePw-btn {
	background: #f5a623;
	color: #fff;
	border: none;
	padding: 10px 18px;
	font-size: 15px;
	border-radius: 8px;
	cursor: pointer;
}

.dialog .close,
.dialogA .close {
	margin-top: 20px;
	text-align: center;
}

.dialog .close button,
.dialogA .close button {
	font-size: 13px;
	color: #854836;
	text-decoration: none;
	border: none;
	background-color: transparent;
	cursor: pointer;
}

.hidden {
	display: none;
}

/* password-reset modal layout fix */
.dialogA>.tb .inner {
	height: auto;
	max-height: 92vh;
	overflow-y: auto;
	padding-bottom: 24px;
}

.dialogA .ct {
	margin-top: 28px;
}

.dialogA .emailCertify-div {
	justify-content: flex-end;
}

.dialogA .sub-btn {
	margin-top: 20px;
}

.dialogA .close {
	margin-top: 12px;
}
</style>
</head>
<body>
	<th:block th:include="common/header"></th:block>
	<main class="content">
		<section class="login-wrap">
			<div class="login-title">로그인</div>
			<form action="/member/login" method="post" class="login-form" autocomplete="off">
				<div class="login-input-wrap">
					<input type="text" name="memberId" id="memberId" placeholder="아이디" th:value="${savedId}" style="outline: none;">
					<input type="password" name="memberPw" id="memberPw" placeholder="비밀번호" style="outline: none;">
				</div>
				<div class="login-option">
					<span class="material-icons-outlined" id="checkBoxOut" style="font-size: 20px;">check_box_outline_blank</span>
					<span class="material-icons" id="checkBox" style="display: none; font-size: 20px;">check_box</span>
					<input type="checkbox" name="saveId" id="login-remain" style="display: none;">
					<label for="login-remain">로그인 정보저장</label>
				</div>
				<span class="IdPw alert" id="IdPw" style="display: none;">아이디와 비밀번호를 입력해주세요.</span>
				<span class="Pw alert" id="Pw" style="display: none;">비밀번호를 입력해주세요.</span>
				<button type="submit" class="login-button">로그인</button>
			</form>
			<div class="login-footer">
				<a href="/member/joinFrm">회원가입</a>
				<span>
					<button type="button" onClick="modal('dialog')" class="id-btn">
						<span>아이디 찾기</span>
					</button>
					<span style="color: #854836">|</span>
					<button type="button" onClick="modal('dialogA')" class="pwSearch-btn">
						<span>비밀번호 찾기</span>
					</button>
				</span>
			</div>
		</section>

		<div id="dialog" class="dialog">
			<div class="tb">
				<div class="inner" style="max-width: 500px;">
					<div class="top">
						<div class="title">아이디 찾기</div>
					</div>
					<div class="ct">
						<div class="searchName-div">
							<span class="material-icons-outlined">dns</span>
							<input type="text" id="findIdName" placeholder="이 름">
						</div>
						<div class="searchPhone-div">
							<span class="material-icons-outlined">phone_android</span>
							<input type="text" id="findIdPhone" placeholder="전화번호 ex) 010-0000-0000">
						</div>
						<div class="result-div id-result-div"></div>
					</div>
					<div class="sub-btn">
						<button type="button" class="search-btn">아이디 찾기</button>
					</div>
					<div class="close">
						<button type="button" class="modal-close">닫기</button>
					</div>
				</div>
			</div>
		</div>

		<div id="dialogA" class="dialogA">
			<div class="tb">
				<div class="inner" style="max-width: 500px;">
					<div class="top">
						<div class="title">비밀번호 재설정</div>
					</div>
					<div class="ct">
						<div class="searchId-div">
							<span class="material-icons-outlined">dns</span>
							<input type="text" id="resetMemberId" placeholder="아이디">
						</div>
						<div class="searchPhone-div">
							<span class="material-icons-outlined">phone_android</span>
							<input type="text" id="resetMemberPhone" placeholder="전화번호 ex) 010-0000-0000">
						</div>

						<div class="searchEmail-div hidden">
							<span class="material-icons-outlined">email</span>
							<input type="text" id="resetEmail" placeholder="이메일 주소">
						</div>
						<div class="emailCertify-div hidden">
							<input type="text" id="resetCode" placeholder="인증번호 입력" style="display: none; border: 1px solid #854836; border-radius: 4px;">
							<button type="button" id="resetVerifyBtn">인증요청</button>
							<button type="button" id="resetCodeConfirmBtn" style="display: none;">인증완료</button>
						</div>

						<div class="searchPw-div hidden">
							<span class="material-icons-outlined">lock</span>
							<input type="password" id="resetNewPw" placeholder="재설정 비밀번호">
						</div>
						<div class="searchPwRe-div hidden">
							<span class="material-icons-outlined">lock</span>
							<input type="password" id="resetNewPwRe" placeholder="비밀번호 확인">
						</div>
						<div class="result-div pw-result-div"></div>
					</div>
					<div class="sub-btn">
						<button type="button" class="insert-btn">확 인</button>
						<button type="button" class="rePw-btn" style="display: none;">재설정하기</button>
					</div>
					<div class="close">
						<button type="button" class="modal-closeA">닫기</button>
					</div>
				</div>
			</div>
		</div>
	</main>

	<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
	<script>
		let resetMailCode = null;
		let resetMailTimer = null;
		let resetEmailVerified = false;
		let resetIdentityVerified = false;
		let verifiedMemberId = "";
		let verifiedMemberPhone = "";

		function modal(id) {
			$("." + id).fadeIn();
		}

		function showIdResult(message, color) {
			$(".id-result-div").html($("<span>").css("color", color).text(message));
		}

		function showPwResult(message, color) {
			$(".pw-result-div").html($("<span>").css("color", color).text(message));
		}

		function resetPwModalState() {
			resetMailCode = null;
			resetEmailVerified = false;
			resetIdentityVerified = false;
			verifiedMemberId = "";
			verifiedMemberPhone = "";

			if (resetMailTimer) {
				clearTimeout(resetMailTimer);
				resetMailTimer = null;
			}

			$("#resetMemberId, #resetMemberPhone, #resetEmail, #resetCode, #resetNewPw, #resetNewPwRe").val("");
			$("#resetEmail").removeClass("confirmed");

			$(".searchEmail-div, .emailCertify-div, .searchPw-div, .searchPwRe-div").addClass("hidden");
			$("#resetCode, #resetCodeConfirmBtn").hide();
			$("#resetVerifyBtn").show();
			$(".insert-btn").show();
			$(".rePw-btn").hide();
			$(".pw-result-div").empty();
		}

		$("#memberId").on("click", function() {
			$(this).removeAttr("placeholder");
		}).on("focusout", function() {
			$(this).attr("placeholder", "아이디");
		});

		$("#memberPw").on("click", function() {
			$(this).removeAttr("placeholder");
		}).on("focusout", function() {
			$(this).attr("placeholder", "비밀번호");
		});

		$("#checkBoxOut, #checkBox").on("click", function() {
			$("#checkBoxOut, #checkBox").toggle();
			$("#login-remain").prop("checked", $("#checkBox").is(":visible"));
		});

		$(".login-button").on("click", function() {
			const memberIdCheck = $("#memberId").val().trim();
			const memberPwCheck = $("#memberPw").val().trim();

			if (!memberIdCheck && !memberPwCheck) {
				$("#IdPw").show();
				$("#Pw").hide();
			} else if (memberIdCheck && !memberPwCheck) {
				$("#Pw").show();
				$("#IdPw").hide();
			} else if (!memberIdCheck && memberPwCheck) {
				$("#Pw").hide();
				$("#IdPw").show();
			}
		});

		window.onload = function() {
			if ($("#memberId").val() !== "") {
				$("#checkBox").show();
				$("#checkBoxOut").hide();
				$("#login-remain").prop("checked", true);
			} else {
				$("#checkBox").hide();
				$("#checkBoxOut").show();
				$("#login-remain").prop("checked", false);
			}
		};

		$(".modal-close").on("click", function(e) {
			e.preventDefault();
			$(this).closest(".dialog").fadeOut();
			$("#findIdName, #findIdPhone").val("");
			$(".id-result-div").empty();
		});

		$(".modal-closeA").on("click", function(e) {
			e.preventDefault();
			$(this).closest(".dialogA").fadeOut();
			resetPwModalState();
		});

		$(".search-btn").on("click", function() {
			const memberName = $("#findIdName").val().trim();
			const memberPhone = $("#findIdPhone").val().trim();

			if (!memberName || !memberPhone) {
				showIdResult("이름과 전화번호를 입력해주세요.", "#BB271A");
				return;
			}

			$.ajax({
				url: "/member/searchId",
				type: "get",
				data: { memberName: memberName, memberPhone: memberPhone },
				success: function(result) {
					if (result && result.memberId) {
						showIdResult("아이디 찾기 결과 ID는 [" + result.memberId + "] 입니다.", "#2854C5");
					} else {
						showIdResult("일치하는 회원 정보가 없습니다.", "#BB271A");
					}
				},
				error: function() {
					showIdResult("조회 중 오류가 발생했습니다. 다시 시도해주세요.", "gray");
				}
			});
		});

		$(".insert-btn").on("click", function() {
			const memberId = $("#resetMemberId").val().trim();
			const memberPhone = $("#resetMemberPhone").val().trim();

			if (!memberId || !memberPhone) {
				showPwResult("아이디와 전화번호를 입력해주세요.", "#BB271A");
				return;
			}

			$.ajax({
				url: "/member/passwordRe",
				type: "get",
				data: { memberId: memberId, memberPhone: memberPhone },
				success: function(result) {
					if (result === true) {
						resetIdentityVerified = true;
						verifiedMemberId = memberId;
						verifiedMemberPhone = memberPhone;

						$(".searchEmail-div, .emailCertify-div, .searchPw-div, .searchPwRe-div").removeClass("hidden");
						$(".insert-btn").hide();
						$(".rePw-btn").show();
						showPwResult("회원 확인 완료. 이메일 인증 후 새 비밀번호를 입력해주세요.", "#2854C5");
					} else {
						showPwResult("아이디 또는 전화번호를 확인해주세요.", "#BB271A");
					}
				},
				error: function() {
					showPwResult("오류가 발생했습니다. 다시 시도해주세요.", "gray");
				}
			});
		});

		$("#resetVerifyBtn").on("click", function() {
			const email = $("#resetEmail").val().trim();
			const emailReg = /^[a-zA-Z0-9+_.-]+@[a-zA-Z0-9.-]+$/;

			if (!resetIdentityVerified) {
				showPwResult("먼저 아이디와 전화번호 확인을 완료해주세요.", "#BB271A");
				return;
			}
			if (!email) {
				showPwResult("이메일을 입력해주세요.", "#BB271A");
				return;
			}
			if (!emailReg.test(email)) {
				showPwResult("이메일 형식을 확인해주세요.", "#BB271A");
				return;
			}

			showPwResult("인증번호 전송 중입니다.", "#2854C5");
			$.ajax({
				url: "/api/emailCode",
				type: "get",
				data: { receiver: email },
				success: function(code) {
					resetMailCode = code;
					resetEmailVerified = false;
					$("#resetEmail").removeClass("confirmed");
					$("#resetCode").show().val("");
					$("#resetVerifyBtn").hide();
					$("#resetCodeConfirmBtn").show();
					showPwResult("인증번호를 입력해주세요.", "#2854C5");

					if (resetMailTimer) {
						clearTimeout(resetMailTimer);
					}
					resetMailTimer = setTimeout(function() {
						resetMailCode = null;
						resetEmailVerified = false;
						$("#resetEmail").removeClass("confirmed");
						$("#resetCodeConfirmBtn").hide();
						$("#resetVerifyBtn").show();
						$("#resetCode").hide().val("");
						showPwResult("인증시간이 만료되었습니다. 다시 요청해주세요.", "#BB271A");
					}, 180000);
				},
				error: function() {
					showPwResult("인증번호 전송에 실패했습니다.", "gray");
				}
			});
		});

		$("#resetCodeConfirmBtn").on("click", function() {
			const inputCode = $("#resetCode").val().trim();

			if (!resetMailCode) {
				showPwResult("인증번호를 다시 요청해주세요.", "#BB271A");
				return;
			}
			if (!inputCode) {
				showPwResult("인증번호를 입력해주세요.", "#BB271A");
				return;
			}
			if (resetMailCode.toLowerCase() !== inputCode.toLowerCase()) {
				showPwResult("인증번호가 일치하지 않습니다.", "#BB271A");
				return;
			}

			resetEmailVerified = true;
			if (resetMailTimer) {
				clearTimeout(resetMailTimer);
				resetMailTimer = null;
			}
			resetMailCode = null;
			$("#resetEmail").addClass("confirmed");
			$("#resetCode").hide();
			$("#resetCodeConfirmBtn").hide();
			showPwResult("이메일 인증이 완료되었습니다.", "#2854C5");
		});

		$(".rePw-btn").on("click", function() {
			const memberPw = $("#resetNewPw").val().trim();
			const memberPwRe = $("#resetNewPwRe").val().trim();
			const pwReg = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{5,15}$/;

			if (!resetIdentityVerified) {
				showPwResult("회원 확인을 먼저 진행해주세요.", "#BB271A");
				return;
			}
			if (!resetEmailVerified) {
				showPwResult("이메일 인증을 완료해주세요.", "#BB271A");
				return;
			}
			if (!memberPw || !memberPwRe) {
				showPwResult("비밀번호와 비밀번호 확인을 입력해주세요.", "#BB271A");
				return;
			}
			if (!pwReg.test(memberPw)) {
				showPwResult("비밀번호는 5~15자, 대문자/소문자/숫자를 포함해야 합니다.", "#BB271A");
				return;
			}
			if (memberPw !== memberPwRe) {
				showPwResult("비밀번호가 일치하지 않습니다.", "#BB271A");
				return;
			}

			$.ajax({
				url: "/member/RePassword",
				type: "post",
				data: {
					memberId: verifiedMemberId,
					memberPhone: verifiedMemberPhone,
					memberPw: memberPw
				},
				success: function(result) {
					if (result === true) {
						showPwResult("비밀번호가 재설정되었습니다. 로그인해주세요.", "#2854C5");
						setTimeout(function() {
							$(".dialogA").fadeOut();
							resetPwModalState();
						}, 1200);
					} else {
						showPwResult("비밀번호 재설정에 실패했습니다.", "#BB271A");
					}
				},
				error: function() {
					showPwResult("오류가 발생했습니다. 다시 시도해주세요.", "gray");
				}
			});
		});
	</script>
	<th:block th:include="common/footer"></th:block>
</body>
</html>
